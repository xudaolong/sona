name: Build whisper.cpp libs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macos-arm64, macos-x86_64, linux-x86_64, linux-arm64, windows-x86_64
        # linux x86_64: ubuntu-22.04 so shipped libs require GLIBC>=2.35/GLIBCXX>=3.4.30, covering Debian/Mint/Ubuntu 22.04 users
        # linux arm64: stays on ubuntu-24.04-arm because LunarG does not publish ARM64 apt packages (glslc/libshaderc-dev unavailable on 22.04 arm)
        runner: [macos-14, macos-15-intel, ubuntu-22.04, ubuntu-24.04-arm, windows-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install Vulkan deps (Linux x86_64)
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: |
          # glslc/libshaderc-dev are not in Ubuntu 22.04 standard repos; install via LunarG Vulkan SDK
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list http://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -qq && sudo apt-get install -y -qq vulkan-sdk glslang-tools
      - name: Install Vulkan deps (Linux ARM64)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libvulkan-dev glslang-tools glslc libshaderc-dev
      - name: Install Vulkan deps (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-vulkan-devel mingw-w64-x86_64-shaderc mingw-w64-x86_64-cmake mingw-w64-x86_64-gcc
      - name: Add MinGW to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "$env:RUNNER_TEMP\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Build and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run scripts/build-libs.py --upload
